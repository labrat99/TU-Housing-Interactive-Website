<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email · Tulane Housing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="auth">
  <div id="site-header"></div>

  <main>
    <div class="verify-card" id="verifyRoot">
      <div class="verify-icon">✉</div>
      <h1>Check your inbox</h1>
      <p>We sent a verification link to <span class="email" id="emailOut">your Tulane email</span>.</p>
      <p>Open that email and click the link to verify your account, then come back here.</p>
      <div class="verify-actions">
        <button class="btn btn-primary btn-block" id="iVerified" type="button">I&rsquo;ve clicked the link — continue</button>
        <button class="link-btn" id="resend" type="button">Resend the link</button>
        <a class="link-btn" href="auth.html">Wrong email? Go back</a>
      </div>
      <p class="form-msg" id="vmsg"></p>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/verify-page.js"></script>
</body>
</html>
