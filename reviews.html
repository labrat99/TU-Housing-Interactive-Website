<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews · Tulane Housing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="reviews">
  <div id="site-header"></div>

  <main>
    <div class="page-head">
      <h1>Reviews</h1>
      <p>Standalone reviews of landlords and properties, from verified Tulane students.</p>
    </div>

    <div class="toolbar">
      <div class="search-mini">
        <input id="q" type="text" placeholder="Search by landlord or building/address&hellip;" />
      </div>
      <select id="neighborhood"><option value="">All neighborhoods</option></select>
      <select id="minRating">
        <option value="0">Any rating</option>
        <option value="3">3+ stars</option>
        <option value="4">4+ stars</option>
        <option value="5">5 stars</option>
      </select>
      <select id="sort">
        <option value="recent">Most recent</option>
        <option value="rating">Highest rated</option>
      </select>
    </div>

    <div class="segmented" id="typeToggle">
      <button type="button" data-type="all" class="active">All</button>
      <button type="button" data-type="landlord">Landlord</button>
      <button type="button" data-type="property">Property</button>
    </div>

    <div class="grid-2" id="reviews-grid"></div>
    <p class="empty" id="empty" hidden>No reviews match your search.</p>

    <div class="info-note">
      <span class="i">i</span>
      <span>Each card is a standalone review — no aggregate scores and no landlord/property profile pages for the MVP. Review cards aren&rsquo;t clickable.</span>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <!-- Firebase (no-build compat SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <!-- App -->
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/cards.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/reviews.js"></script>
</body>
</html>
