<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your posts · Tulane Housing Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="account">
  <div id="site-header"></div>

  <main>
    <div class="account-page" id="accountPage" hidden>
      <div class="page-head">
        <h1>Your posts</h1>
        <p>Private — only you can see this page.</p>
      </div>

      <div class="account-strip">
        <span class="verified"><span class="check">✓</span> Verified Tulane student</span>
        <span class="acct-email" id="acctEmail"></span>
      </div>

      <div class="segmented" id="acctTabs">
        <button type="button" id="tabReviews" class="active">My reviews</button>
        <button type="button" id="tabSublets">My sublets</button>
      </div>

      <div id="acctList"></div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/cards.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/account.js"></script>
</body>
</html>
